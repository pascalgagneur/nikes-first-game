<!DOCTYPE html>
<html>
<head>
    <title>Vårt första spel</title>
    <style>
        canvas { background: #eee; display: block; margin: 0 auto; }
    </style>
</head>
<body>
    <canvas id="spelPlan" width="1000" height="600"></canvas>

    <script>
function spelaHoppLjud() {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();

    oscillator.type = 'square'; // Ger ett retro "Nintendo"-ljud
    oscillator.frequency.setValueAtTime(150, audioCtx.currentTime); // Startfrekvens
    oscillator.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1); // Svep uppåt

    gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);

    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    oscillator.start();
    oscillator.stop(audioCtx.currentTime + 0.1);
}
// Lista på era favorit-Mellolåtar
const melloLatat = [
    "mello_1.mp3"  
];
let nuvarandeLatIndex = 0;
const bakgrundsMusik = new Audio(melloLatat[nuvarandeLatIndex]);

// Inställningar för musiken
bakgrundsMusik.loop = false; // Vi vill byta låt när en är slut
bakgrundsMusik.volume = 0.2; // Sänk volymen lite så man hör hoppen!

// När en låt tar slut, spela nästa!
bakgrundsMusik.onended = function() {
    nuvarandeLatIndex = (nuvarandeLatIndex + 1) % melloLatat.length;
    bakgrundsMusik.src = melloLatat[nuvarandeLatIndex];
    bakgrundsMusik.play();
};

      const canvas = document.getElementById("spelPlan");
const ctx = canvas.getContext("2d");

const spelarBild = new Image();
spelarBild.src = "tjej.png"; 

const bakgrundsBild = new Image();
bakgrundsBild.src = "stall_bakgrund.png"; 

// --- Inställningar ---
let spelAktiv = true; // Håller koll på om spelet körs eller om det är "Game Over"
let poang = 0;
let highscore = 0;

// Spelare
const markNiva = canvas.height - 80;
let x = 50;
let y = markNiva - 50;
const spelarBredd = 60; 
const spelarHojd = 80;  
let velocityY = 0;
const gravitation = 0.6;
const hoppStyrka = -15;
let starPaMarken = false;

// Hinder
let hinderX = canvas.width;
const hinderY = markNiva - 30;
let hinderFart = 4;

let tangenter = {};

// --- Funktion för att starta om spelet ---
function startaOm() {
    poang = 0;
    hinderFart = 4;
    hinderX = canvas.width;
    x = 50;
    y = markNiva - spelarHojd;
    velocityY = 0;
    spelAktiv = true;
}

window.addEventListener("keydown", (e) => { 
    if (bakgrundsMusik.paused) {
            bakgrundsMusik.play();
    }
    tangenter[e.key] = true; 
    // Om spelet är slut och man trycker på Enter -> Starta om!
    if (!spelAktiv && e.key === "Enter") {
        startaOm();
        
    }
});
window.addEventListener("keyup", (e) => { tangenter[e.key] = false; });

function uppdatera() {
    if (!spelAktiv) return; // Stoppa uppdateringar om man krockat

    // Hopp och rörelse
    if (tangenter["ArrowLeft"]) x -= 5;
    if (tangenter["ArrowRight"]) x += 5;

    velocityY += gravitation;
    y += velocityY;

    if (y > markNiva - spelarHojd) {
        y = markNiva - spelarHojd;
        velocityY = 0;
        starPaMarken = true;
    }

    if ((tangenter["ArrowUp"] || tangenter[" "]) && starPaMarken) {
        velocityY = hoppStyrka;
        starPaMarken = false;
        spelaHoppLjud(); // Magiskt kod-ljud!
    }
    

    // Hinder
    hinderX -= hinderFart;
    if (hinderX < -30) {
        hinderX = canvas.width;
        poang += 1;
        hinderFart += 0.2; 
    }

    // Krock-koll
    if (x < hinderX + 30 && x + spelarBredd > hinderX && 
        y < hinderY + 30 && y + spelarHojd > hinderY) {
        spelAktiv = false; // Stoppa spelet istället för alert
        if (poang > highscore) highscore = poang;
    }

    if (x < 0) x = 0;
    if (x > canvas.width - spelarBredd) x = canvas.width - spelarBredd;
}

function rita() {
    ctx.clearRect(0, 0, canvas.width, canvas.height); 

    if (bakgrundsBild.complete) { 
        ctx.drawImage(bakgrundsBild, 0, 0, canvas.width, canvas.height);
    }

    uppdatera(); 

    // Rita tjejen
    ctx.drawImage(spelarBild, x, y, spelarBredd, spelarHojd);

    // Rita hinder
    ctx.fillStyle = "#8B4513"; 
    ctx.fillRect(hinderX, hinderY, 30, 30);
    
    // Rita poäng uppe i hörnet
    ctx.fillStyle = "white";
    ctx.font = "bold 20px Arial";
    ctx.fillText("Poäng: " + poang, 20, 30);

    // --- GAME OVER RUTA ---
    if (!spelAktiv) {
        // Rita en halvgenomskinlig svart ruta över hela skärmen
        ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
        ctx.fillRect(canvas.width/2 - 150, 100, 300, 200);

        // Rita vit text i rutan
        ctx.fillStyle = "white";
        ctx.textAlign = "center";
        ctx.font = "bold 30px Arial";
        ctx.fillText("GAME OVER", canvas.width/2, 160);
        
        ctx.font = "20px Arial";
        ctx.fillText("Poäng: " + poang, canvas.width/2, 200);
        ctx.fillText("Bästa: " + highscore, canvas.width/2, 230);
        
        ctx.font = "italic 16px Arial";
        ctx.fillText("Tryck på ENTER för att köra igen", canvas.width/2, 270);
        ctx.textAlign = "left"; // Återställ textjustering
    }
    
    requestAnimationFrame(rita); 
}

let bilderLaddade = 0;
function bildLaddad() {
    bilderLaddade++;
    if (bilderLaddade === 2) rita();
}
spelarBild.onload = bildLaddad;
bakgrundsBild.onload = bildLaddad;
    </script>
</body>
</html>
