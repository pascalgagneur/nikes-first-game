<!DOCTYPE html>
<html>
<head>
    <title>Vårt första spel</title>
    <style>
        canvas { background: #eee; display: block; margin: 0 auto; }
    </style>
</head>
<body>
    <canvas id="spelPlan" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById("spelPlan");
const ctx = canvas.getContext("2d");

// --- 1. Skapa bild-objekt och ladda in filerna ---

// Ladda spelarbilden (precis som förut)
const spelarBild = new Image();
spelarBild.src = "tjej.png"; 

// NYTT: Ladda bakgrundsbilden
const bakgrundsBild = new Image();
bakgrundsBild.src = "stall_bakgrund.png"; // Se till att filen heter exakt så här och ligger i samma mapp

// --- Spelarinställningar (precis som förut) ---
let x = 180;
let y = 180;
const fart = 4;
const spelarBredd = 60; 
const spelarHojd = 80;  

// Kontrollinställningar (precis som förut)
let tangenter = {};

// Lyssna efter när man trycker ner och släpper en tangent
window.addEventListener("keydown", (e) => { tangenter[e.key] = true; });
window.addEventListener("keyup", (e) => { tangenter[e.key] = false; });

function uppdatera() {
    // Flytta spelaren baserat på piltangenter
    if (tangenter["ArrowLeft"]) x -= fart;
    if (tangenter["ArrowRight"]) x += fart;
    if (tangenter["ArrowUp"]) y -= fart;
    if (tangenter["ArrowDown"]) y += fart;

    // Hindra gubben från att gå utanför kanten
    if (x < 0) x = 0;
    if (x > canvas.width - spelarBredd) x = canvas.width - spelarBredd;
    if (y < 0) y = 0;
    if (y > canvas.height - spelarHojd) y = canvas.height - spelarHojd;
}

function rita() {
    // 1. Sudda hela canvasen (valfritt när man har bakgrundsbild, men bra praxis)
    ctx.clearRect(0, 0, canvas.width, canvas.height); 

    // NYTT: 2. Rita bakgrundsbilden FÖRE spelaren
    // ctx.drawImage(bild, x, y, bredd, höjd)
    // Vi startar i (0,0) och ritar den över hela canvasens storlek
    if (bakgrundsBild.complete) { // Säkerställ att bakgrunden är laddad
        ctx.drawImage(bakgrundsBild, 0, 0, canvas.width, canvas.height);
    }

    // 3. Beräkna den nya positionen
    uppdatera(); 

    // 4. Rita spelaren OVANPÅ bakgrunden
    ctx.drawImage(spelarBild, x, y, spelarBredd, spelarHojd);
    
    // 5. Fortsätt loopen
    requestAnimationFrame(rita); 
}

// Vi måste vänta tills BÅDA bilderna har laddats klart innan vi startar spelet
let bilderLaddade = 0;
function bildLaddad() {
    bilderLaddade++;
    if (bilderLaddade === 2) {
        rita();
    }
}

spelarBild.onload = bildLaddad;
bakgrundsBild.onload = bildLaddad;
    </script>
</body>
</html>
