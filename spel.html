<!DOCTYPE html>
<html>
<head>
    <title>Vårt första spel</title>
    <style>
        canvas { background: #eee; display: block; margin: 0 auto; }
    </style>
</head>
<body>
    <canvas id="spelPlan" width="800" height="800"></canvas>

    <script>
        const canvas = document.getElementById("spelPlan");
const ctx = canvas.getContext("2d");

// 1. Skapa ett bild-objekt och ladda in filen
const spelarBild = new Image();
spelarBild.src = "tjej.png"; // Se till att filen heter exakt så här och ligger i samma mapp

// Spelarinställningar (Justera storleken så den passar er bild)
let x = 180;
let y = 180;
const fart = 5;
const spelarBredd = 40; // Hur bred tjejen ska vara på skärmen
const spelarHojd = 100;  // Hur hög tjejen ska vara på skärmen

// Kontrollinställningar
let tangenter = {};

// Lyssna efter när man trycker ner och släpper en tangent
window.addEventListener("keydown", (e) => { tangenter[e.key] = true; });
window.addEventListener("keyup", (e) => { tangenter[e.key] = false; });

function uppdatera() {
    // Flytta spelaren baserat på piltangenter
    if (tangenter["ArrowLeft"]) x -= fart;
    if (tangenter["ArrowRight"]) x += fart;
    if (tangenter["ArrowUp"]) y -= fart;
    if (tangenter["ArrowDown"]) y += fart;

    // Hindra gubben från att gå utanför kanten
    if (x < 0) x = 0;
    if (x > canvas.width - spelarBredd) x = canvas.width - spelarBredd;
    if (y < 0) y = 0;
    if (y > canvas.height - spelarHojd) y = canvas.height - spelarHojd;
}

function rita() {
    // 1. Sudda hela canvasen för den nya bilden
    ctx.clearRect(0, 0, canvas.width, canvas.height); 

    // 2. Beräkna den nya positionen
    uppdatera(); 

    // 3. Rita bilden istället för fyrkanten!
    // ctx.drawImage(bild, x, y, bredd, höjd)
    ctx.drawImage(spelarBild, x, y, spelarBredd, spelarHojd);
    
    // 4. Fortsätt loopen
    requestAnimationFrame(rita); 
}

// Vi måste vänta tills bilden har laddats klart innan vi startar spelet
spelarBild.onload = function() {
    rita();
};
    </script>
</body>
</html>
